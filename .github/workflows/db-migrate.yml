name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply pending migrations
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set (repo Settings → Secrets and variables → Actions)."
            exit 1
          fi
          # --- safe diagnostics (never prints the password) ---
          userpart=$(echo "$DB_URL" | sed -E 's#^[a-z]+://([^:]+):.*#\1#')
          hostpart=$(echo "$DB_URL" | sed -E 's#^.*@([^:/]+).*#\1#')
          pass=$(echo "$DB_URL" | sed -E 's#^[a-z]+://[^:]+:(.*)@[^@]*$#\1#')
          echo "user=$userpart host=$hostpart passlen=${#pass}"
          case "$pass" in *"["*|*"]"*) echo "::error::Password still contains [brackets] - placeholder not replaced";; esac
          case "$pass" in *" "*) echo "::warning::Password contains a space";; esac
          if [ "$(printf %s "$DB_URL" | wc -l)" -gt 0 ]; then echo "::warning::Secret contains a newline"; fi
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c \
            "create table if not exists public._migrations (name text primary key, applied_at timestamptz default now());"
          for f in $(ls migrations/*.sql | sort); do
            name=$(basename "$f")
            applied=$(psql "$DB_URL" -tA -c "select 1 from public._migrations where name='$name'")
            if [ "$applied" = "1" ]; then
              echo "skip  $name (already applied)"
            else
              echo "apply $name"
              psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
              psql "$DB_URL" -v ON_ERROR_STOP=1 -c "insert into public._migrations(name) values ('$name');"
            fi
          done
          echo "All migrations applied."

<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>XulqskorAI — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E1726;--surface:#15203449;--card:#172338;--border:#26344f;--muted:#8FA6C9;--text:#EAF1FB;
 --navy:#1E3A6A;--navy3:#294B85;--orange:#F26A21;--teal:#17A2A0;--teal2:#25B8AE;--danger:#E23B3B;
 --grad:linear-gradient(135deg,#F26A21,#F58634)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:
  radial-gradient(1200px 600px at 80% -10%,#1b2b49 0%,transparent 60%),
  radial-gradient(900px 500px at -10% 20%,#16233c 0%,transparent 55%),var(--bg);
  color:var(--text);min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px}
a{color:inherit}
.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:.2s}
.btn-primary{background:var(--grad);color:#fff}
.btn-navy{background:var(--navy);color:#fff}
.btn-ghost{background:transparent;border:1.4px solid var(--border);color:var(--text)}
.btn-block{width:100%;display:block}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:default}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.field input{width:100%;padding:12px 13px;border-radius:11px;border:1.4px solid var(--border);background:#0f1a2e;color:var(--text);font-size:15px;font-family:inherit}
.field input:focus{outline:0;border-color:var(--navy3)}
.center{max-width:400px;margin:8vh auto}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;justify-content:center}
.brand b{font-size:19px;font-weight:800}
.dot{width:11px;height:11px;border-radius:50%;background:var(--orange)}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.tag{display:inline-block;font-size:11px;letter-spacing:.14em;font-weight:800;color:var(--orange);margin-bottom:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.kpi .lab{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px}
.kpi .val{font-size:30px;font-weight:800;line-height:1}
.kpi .sub{font-size:12px;margin-top:6px}
.muted{color:var(--muted)}
.adm-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.adm-card h3{font-size:16px;font-weight:800;margin-bottom:14px}
table.adm{width:100%;border-collapse:collapse;font-size:13px}
table.adm th{text-align:left;color:var(--muted);font-weight:700;font-size:11.5px;letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
table.adm td{padding:10px;border-bottom:1px solid #1e2c46;vertical-align:middle}
table.adm tr:hover td{background:#18243c}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill.ind{background:#294b8533;color:#8fb0e8}
.pill.leg{background:#17a2a033;color:#4fd3cf}
.pill.ok{background:#17a2a022;color:#3ec7c2}
.pill.review{background:#e23b3b22;color:#f07d7d}
.mini-bars{display:flex;gap:2px;align-items:flex-end;height:26px}
.mini-bars i{width:5px;border-radius:2px;display:block}
.abar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.abar .nm{width:180px;font-size:13px}
.abar .tr{flex:1;height:9px;background:#0f1a2e;border-radius:6px;overflow:hidden}
.abar .tr i{display:block;height:100%;border-radius:6px}
.abar .vl{width:34px;text-align:right;font-weight:700;font-size:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rec{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px}
.rec .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:800;flex-shrink:0}
.rec h5{font-size:13.5px;margin-bottom:3px}
.rec p{font-size:12.5px;color:var(--muted)}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
.err{background:#e23b3b1a;border:1px solid #e23b3b55;color:#f5a3a3;border-radius:11px;padding:11px;font-size:13px;margin-bottom:14px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tabs button{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:sp 1s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:820px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.abar .nm{width:120px}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ===== config ===== */
const SUPABASE_URL='https://bzufysuolfbhxhyxxnts.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6dWZ5c3VvbGZiaHhoeXh4bnRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MjM4OTgsImV4cCI6MjEwMDI5OTg5OH0.PHFvS49SwUxD5CvnrKgUrCeC3g0_l1BkMnyO5noPNg8';
const SB=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const DIMS=["CON","INT","SC","LOC","MON","PLN"];
const DIMMETA={CON:{c:"#294B85",n:"Mas'uliyat va tartib"},INT:{c:"#F26A21",n:"Halollik"},SC:{c:"#17A2A0",n:"O'zini tuta bilish"},LOC:{c:"#25B8AE",n:"Hayotini nazorat qilish"},MON:{c:"#1E3A6A",n:"Pulni boshqarish"},PLN:{c:"#F58634",n:"Rejalashtirish"}};
const REASON={r_fast:"Juda tez javoblar",r_streak:"Bir xil pozitsiya ketma-ketligi",r_contra:"Qarama-qarshi javoblar",r_coach:"Tashqi yordam belgilari"};
let ROWS=null, TAB='dash', ADMIN=false;
const $=id=>document.getElementById(id);
const app=$('app');
function bandColor(b){return {A:'#17A2A0',B:'#25B8AE',C:'#F58634',D:'#E23B3B'}[b]||'#8FA6C9';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB');}catch(e){return d;}}

/* ===== views ===== */
function loginView(msg){
  app.innerHTML=`<div class="center"><div class="brand"><span class="dot"></span><b>XulqskorAI · Admin</b></div>
    <div class="card">
      <h2 style="font-size:20px;font-weight:800;text-align:center;margin-bottom:4px">Boshqaruv paneli</h2>
      <p class="muted" style="text-align:center;font-size:13px;margin-bottom:20px">Admin hisobingiz bilan kiring</p>
      ${msg?`<div class="err">${esc(msg)}</div>`:''}
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="admin@email.com"></div>
      <div class="field"><label>Parol</label><input id="password" type="password" placeholder="••••••••"></div>
      <button class="btn btn-navy btn-block" id="loginBtn" onclick="doLogin()">Kirish</button>
      <div class="note">Faqat admin huquqiga ega hisoblar kira oladi.</div>
    </div></div>`;
  const p=$('password'); if(p) p.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}
function loadingView(){app.innerHTML=`<div class="spin"></div>`;}

async function doLogin(){
  const email=($('email').value||'').trim(), password=$('password').value||'';
  if(!email||!password){loginView('Email va parolni kiriting');return;}
  const btn=$('loginBtn'); btn.disabled=true; btn.textContent='…';
  const {data,error}=await SB.auth.signInWithPassword({email,password});
  if(error){loginView('✕ '+error.message);return;}
  await afterAuth(data.user);
}
async function doLogout(){await SB.auth.signOut();ROWS=null;ADMIN=false;loginView();}

async function afterAuth(user){
  loadingView();
  // verify admin role
  const {data:prof,error:pe}=await SB.from('profiles').select('role,full_name').eq('id',user.id).maybeSingle();
  if(pe){loginView('Profilni o‘qishda xato: '+pe.message);return;}
  if(!prof||prof.role!=='admin'){
    app.innerHTML=`<div class="center"><div class="card">
      <div style="font-size:40px;text-align:center">⛔</div>
      <h2 style="font-size:19px;font-weight:800;text-align:center;margin:8px 0">Ruxsat yo‘q</h2>
      <p class="muted" style="text-align:center;font-size:13.5px;margin-bottom:18px">Bu hisob (${esc(user.email)}) admin emas. Supabase’da rolingizni <b>admin</b> qiling.</p>
      <button class="btn btn-ghost btn-block" onclick="doLogout()">Chiqish</button></div></div>`;
    return;
  }
  ADMIN=true;
  await loadData();
}

async function loadData(){
  loadingView();
  const [{data:res,error:re},{data:profs,error:pe}]=await Promise.all([
    SB.from('test_results').select('*').order('created_at',{ascending:false}),
    SB.from('profiles').select('*')
  ]);
  if(re||pe){app.innerHTML=`<div class="wrap"><div class="err">Ma’lumotlarni yuklashda xato: ${esc((re||pe).message)}</div><button class="btn btn-ghost" onclick="loadData()">Qayta urinish</button></div>`;return;}
  const pmap={}; (profs||[]).forEach(p=>pmap[p.id]=p);
  ROWS=(res||[]).map(r=>{const p=pmap[r.user_id]||{};return {...r,full_name:p.full_name,type:p.type,phone:p.phone,org_name:p.org_name};});
  render();
}

function render(){
  const D=ROWS||[];
  const total=D.length;
  const avg=total?Math.round(D.reduce((s,x)=>s+(x.overall||0),0)/total):0;
  const rev=D.filter(x=>x.review).length;
  const tabs=[['dash','Boshqaruv'],['appl','Arizachilar'],['review','Tekshiruv'],['dims','O‘lchamlar']];
  let body='';
  if(TAB==='dash'){
    body=`<div class="kpi-grid">
      <div class="kpi"><div class="lab">Jami arizachilar</div><div class="val">${total}</div></div>
      <div class="kpi"><div class="lab">O‘rtacha ball</div><div class="val" style="color:var(--teal2)">${avg}<span style="font-size:15px">/100</span></div></div>
      <div class="kpi"><div class="lab">Tekshiruvda</div><div class="val" style="color:var(--danger)">${rev}</div><div class="sub muted">${total?Math.round(rev/total*100):0}%</div></div>
      <div class="kpi"><div class="lab">A/B daraja</div><div class="val" style="color:var(--orange)">${D.filter(x=>x.band==='A'||x.band==='B').length}</div></div>
    </div>
    <div class="two-col">
      <div class="adm-card"><h3>O‘lchamlar bo‘yicha o‘rtacha</h3>${dimBars(D)}</div>
      <div class="adm-card"><h3>Tekshiruv navbati</h3>${reviewList(D.filter(x=>x.review).slice(0,6))}</div>
    </div>`;
  }else if(TAB==='appl'){
    body=`<div class="adm-card"><h3>Arizachilar (${total})</h3>
      <div style="overflow-x:auto"><table class="adm"><thead><tr>
      <th>Ism</th><th>Turi</th><th>Telefon</th><th>Sana</th><th>Savol</th><th>Ball</th><th>Daraja</th><th>O‘lchamlar</th><th>Ishonch</th></tr></thead><tbody>
      ${D.length?D.map(rowHtml).join(''):`<tr><td colspan="9" class="muted" style="text-align:center;padding:26px">Hozircha arizachilar yo‘q</td></tr>`}
      </tbody></table></div></div>`;
  }else if(TAB==='review'){
    const rv=D.filter(x=>x.review);
    body=`<div class="adm-card"><h3>Tekshiruv navbati (${rv.length})</h3>${rv.length?reviewList(rv):'<p class="muted">Tekshiruvga muhtoj arizachilar yo‘q.</p>'}</div>`;
  }else if(TAB==='dims'){
    body=`<div class="adm-card"><h3>O‘lchamlar bo‘yicha o‘rtacha ballar</h3>${dimBars(D)}
      <p class="muted" style="font-size:12.5px;margin-top:14px">${DIMS.map(d=>DIMMETA[d].n+' ('+d+')').join(' · ')}</p></div>`;
  }
  app.innerHTML=`
    <div class="topbar">
      <div><div class="tag">BOSHQARUV PANELI</div><h1 style="font-size:24px;font-weight:800">Diagnostika boshqaruvi</h1></div>
      <div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="loadData()">↻ Yangilash</button>
      <button class="btn btn-ghost" onclick="doLogout()">Chiqish</button></div>
    </div>
    <div class="tabs">${tabs.map(([k,l])=>`<button class="${TAB===k?'on':''}" onclick="setTab('${k}')">${l}</button>`).join('')}</div>
    ${body}`;
}
function setTab(t){TAB=t;render();}
function rowHtml(x){
  const bars=`<div class="mini-bars">${DIMS.map(d=>{const v=(x.adjusted&&x.adjusted[d])||0;return `<i style="height:${4+v/100*22}px;background:${DIMMETA[d].c}"></i>`;}).join('')}</div>`;
  const typ=x.type==='leg'?`<span class="pill leg">Yuridik</span>`:`<span class="pill ind">Jismoniy</span>`;
  const val=x.review?`<span class="pill review">REVIEW · ${x.coeff??''}</span>`:`<span class="pill ok">OK · ${x.coeff??''}</span>`;
  const nm=esc(x.full_name||'—')+(x.org_name?`<div class="muted" style="font-size:11px">${esc(x.org_name)}</div>`:'');
  return `<tr><td><b>${nm}</b></td><td>${typ}</td><td>${esc(x.phone||'—')}</td><td>${fmtDate(x.created_at)}</td><td>${x.qs_count??'—'}</td>
    <td><b style="color:${bandColor(x.band)}">${x.overall??'—'}</b></td>
    <td><span class="pill" style="background:${bandColor(x.band)}22;color:${bandColor(x.band)}">${x.band||'—'}</span></td>
    <td>${bars}</td><td>${val}</td></tr>`;
}
function dimBars(D){
  return DIMS.map(d=>{const vals=D.map(x=>(x.adjusted&&x.adjusted[d])||0);const a=vals.length?Math.round(vals.reduce((s,v)=>s+v,0)/vals.length):0;
    return `<div class="abar"><div class="nm">${DIMMETA[d].n}</div><div class="tr"><i style="width:${a}%;background:${DIMMETA[d].c}"></i></div><div class="vl">${a}</div></div>`;}).join('');
}
function reviewList(rv){
  if(!rv.length)return '<p class="muted">Bo‘sh.</p>';
  return rv.map(x=>`<div class="rec" style="border-color:var(--danger)"><div class="ic" style="background:var(--danger)">⚠</div>
    <div><h5>${esc(x.full_name||'—')} · <span class="pill review">${x.coeff??''}</span></h5>
    <p>${(x.reasons&&x.reasons.length?x.reasons.map(r=>REASON[r]||r):['Past ishonch koeffitsiyenti']).join(' · ')}</p></div></div>`).join('');
}

/* ===== boot ===== */
(async()=>{
  loadingView();
  const {data}=await SB.auth.getSession();
  if(data&&data.session){await afterAuth(data.session.user);}
  else loginView();
})();
</script>
</body>
</html>
